name: "Pipeline"

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '30 1 * * 0' # Weekly CodeQL scan
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------
  # STAGE: LINT
  # ---------------------------------------------------------
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: markdownlint "**/*.md" --ignore node_modules --ignore vendor --ignore _site

  # ---------------------------------------------------------
  # STAGE: ANALYZE
  # ---------------------------------------------------------
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'ruby' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4

  # ---------------------------------------------------------
  # STAGE: TEST
  # ---------------------------------------------------------
  playwright:
    name: Playwright E2E Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Setup Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: 3.4.9
          bundler-cache: true
      - name: Start Jekyll
        run: bundle exec jekyll serve --port 4000 --future &
      - name: Wait for Jekyll
        run: timeout 60 bash -c 'until curl -s http://127.0.0.1:4000 > /dev/null; do sleep 2; done'
      - name: Start ZAP daemon
        run: |
          docker pull ghcr.io/zaproxy/zaproxy:stable
          docker run -d --network host --name zap ghcr.io/zaproxy/zaproxy:stable zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.disablekey=true -config api.addrs.any.enable=true
          while ! curl -s http://127.0.0.1:8080 > /dev/null; do sleep 1; done
      - name: Run Playwright tests
        run: npx playwright test
        env:
          HTTP_PROXY: "http://127.0.0.1:8080"
      - name: Generate ZAP Report
        if: ${{ !cancelled() }}
        run: |
          sleep 5
          curl -s http://127.0.0.1:8080/OTHER/core/other/htmlreport/ > zap-report.html
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: zap-report
          path: zap-report.html
          retention-days: 30
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ---------------------------------------------------------
  # STAGE: PERFORMANCE
  # ---------------------------------------------------------
  performance:
    name: k6 Load Testing
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: 3.4.9
          bundler-cache: true
      - name: Start Jekyll Server
        run: bundle exec jekyll serve --port 4000 --detach
      - name: Wait for server
        run: sleep 5
      - name: Run k6 load test
        run: docker run --network host -v ${{ github.workspace }}:/workspace -w /workspace grafana/k6:latest run tests/performance/load.js

  # ---------------------------------------------------------
  # STAGE: BUILD
  # ---------------------------------------------------------
  build:
    name: Build Site
    # Only run the build if the lint, analyze, test, and performance stages pass
    needs: [markdownlint, codeql, playwright, performance]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: 3.4.9
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          bundle exec htmlproofer _site \
            \-\-disable-external \
            \-\-ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  # ---------------------------------------------------------
  # STAGE: DEPLOY
  # ---------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    # Only deploy if the build stage succeeds, and only on pushes to main (not PRs)
    if: github.event_name == 'push'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
